<!DOCTYPE html>
<html>
<head>
    <title>Pokémon TCG Smart Hunter 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: Arial; background: #0f0f0f; color: #00ff88; padding: 20px; }
        .box { background: #1a1a1a; padding: 18px; margin: 15px 0; border-radius: 8px; border: 2px solid #00ff88; }
        button { padding: 10px 16px; margin: 5px; font-weight: bold; }
        input, textarea { background: #222; color: #0f0; border: 1px solid #0f0; padding: 8px; width: 100%; margin: 5px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎯 Pokémon TCG Smart Hunter</h1>
    <button onclick="toggleBot()" id="toggleBtn" class="green" style="font-size:18px;">START BOT</button>

    <div class="box">
        <h2>Settings</h2>
        <label><input type="checkbox" id="aggressive" onchange="saveConfig()"> Aggressive Mode</label><br>
        <label><input type="checkbox" id="proxy" onchange="saveConfig()"> Use Proxies</label><br><br>
        ZIP Code: <input id="zip" value="32301" onchange="saveConfig()"><br><br>
        Discord Webhook: <input id="webhook" style="width:100%" onchange="saveConfig()">
        <button onclick="saveConfig()">Save All Settings</button>
    </div>

    <div class="box">
        <h2>Add Residential Proxy</h2>
        <input id="newProxy" placeholder="http://user:pass@ip:port">
        <button onclick="addProxy()">Add Proxy</button>
    </div>

    <div class="box">
        <h2>Live Logs</h2>
        <div id="logs" style="background:#000; height:400px; overflow-y:scroll; padding:10px; font-family:monospace;"></div>
    </div>
</div>

<script>
    const socket = io();
    socket.on('log', d => {
        document.getElementById('logs').innerHTML += d.message + '<br>';
        document.getElementById('logs').scrollTop = 999999;
    });

    function toggleBot() {
        const btn = document.getElementById('toggleBtn');
        const action = btn.innerText.includes('START') ? 'start' : 'stop';
        fetch('/api/' + action, {method: 'POST'}).then(() => btn.innerText = btn.innerText.includes('START') ? 'STOP BOT' : 'START BOT');
    }

    function saveConfig() {
        const data = {
            AGGRESSIVE_MODE: document.getElementById('aggressive').checked,
            USE_PROXY: document.getElementById('proxy').checked,
            ZIP_CODE: document.getElementById('zip').value,
            DISCORD_WEBHOOK: document.getElementById('webhook').value
        };
        fetch('/api/config', {method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)});
    }

    function addProxy() {
        alert("Proxy added to config (edit app.py manually for now)");
    }

    window.onload = () => {
        document.getElementById('toggleBtn').innerText = "START BOT";
    };
</script>
</body>
</html>
