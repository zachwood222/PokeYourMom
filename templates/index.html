<!DOCTYPE html>
<html>
<head>
    <title>Pokémon TCG Sniper 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background: linear-gradient(180deg, #0a0a2a 0%, #1a0033 100%);
            color: #ffcc00;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            image-rendering: pixelated;
        }
        .container { max-width: 1100px; margin: auto; }
        h1 {
            text-align: center;
            font-size: 2.2em;
            text-shadow: 0 0 15px #ff0000;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .pokeball {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #fff 0%, #fff 40%, #ff0000 40%, #ff0000 60%, #000 60%, #000 100%);
            border-radius: 50%;
            border: 4px solid #000;
            position: relative;
        }
        .pokeball::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            background: #000;
            border-radius: 50%;
            border: 3px solid #fff;
        }
        .box {
            background: rgba(0, 0, 0, 0.85);
            border: 4px solid #ffcc00;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
        }
        button {
            font-family: 'Press Start 2P', cursive;
            padding: 14px 24px;
            margin: 8px;
            font-size: 1em;
            border: 4px solid #ff0000;
            background: #000;
            color: #ffcc00;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff0000;
        }
        .green { border-color: #00ff00; color: #00ff00; }
        .red { border-color: #ff0000; color: #ff0000; }
        .blue { border-color: #00aaff; color: #00aaff; }
        
        #logs {
            background: #000;
            border: 4px solid #00ff00;
            height: 380px;
            overflow-y: auto;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.4;
        }
        .product-list li {
            background: #111;
            border: 3px solid #00ffcc;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <span class="pokeball"></span>
        POKÉMON TCG SNIPER 2026
        <span class="pokeball"></span>
    </h1>

    <div style="text-align:center; margin:15px 0;">
        <button onclick="toggleBot()" id="toggleBtn" class="green" style="font-size:1.3em; padding:18px 40px;">START BOT</button>
        <button onclick="sendTestAlert()" class="blue" style="font-size:1.1em;">🧪 TEST DISCORD ALERT</button>
    </div>

    <div class="box">
        <h2>⚙️ Settings</h2>
        <label><input type="checkbox" id="aggressive" onchange="saveConfig()"> AGGRESSIVE MODE</label><br><br>
        <label><input type="checkbox" id="proxy" onchange="saveConfig()"> USE RESIDENTIAL PROXIES</label><br><br>
        ZIP Code: <input id="zip" value="32301" onchange="saveConfig()" style="width:120px"><br><br>
        Discord Webhook: <input id="webhook" style="width:100%" onchange="saveConfig()">
        <button onclick="saveConfig()" style="margin-top:15px;">💾 SAVE SETTINGS</button>
    </div>

    <div class="box">
        <h2>📦 Monitored Products</h2>
        <ul id="productList" class="product-list" style="list-style:none; padding:0;"></ul>
    </div>

    <div class="box">
        <h2>📜 LIVE LOGS</h2>
        <div id="logs"></div>
    </div>
</div>

<script>
    const socket = io();
    socket.on('log', d => {
        const logs = document.getElementById('logs');
        logs.innerHTML += d.message + '<br>';
        logs.scrollTop = logs.scrollHeight;
    });

    function toggleBot() {
        const btn = document.getElementById('toggleBtn');
        const action = btn.innerText.includes('START') ? 'start' : 'stop';
        fetch('/api/' + action, {method: 'POST'})
            .then(() => {
                btn.innerText = btn.innerText.includes('START') ? 'STOP BOT' : 'START BOT';
                btn.className = btn.innerText.includes('START') ? 'green' : 'red';
            });
    }

    function saveConfig() {
        const data = {
            AGGRESSIVE_MODE: document.getElementById('aggressive').checked,
            USE_PROXY: document.getElementById('proxy').checked,
            ZIP_CODE: document.getElementById('zip').value,
            DISCORD_WEBHOOK: document.getElementById('webhook').value
        };
        fetch('/api/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        }).then(() => alert('✅ Settings Saved!'));
    }

    function sendTestAlert() {
        fetch('/api/test-alert', {method: 'POST'})
            .then(() => alert('🧪 Test alert sent to Discord!'));
    }

    function loadProducts() {
        fetch('/api/products')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('productList');
                list.innerHTML = '';
                data.forEach(p => {
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${p.retailer}</strong> — ${p.name}`;
                    list.appendChild(li);
                });
            });
    }

    window.onload = () => {
        loadProducts();
        document.getElementById('toggleBtn').innerText = "START BOT";
    };
</script>
</body>
</html>
