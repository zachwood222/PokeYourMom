<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Sentinel</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    body { font-family: Inter, system-ui, Arial, sans-serif; margin: 0; background: #0d1117; color: #e6edf3; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; }
    h1, h2 { margin-top: 0; }
    label { display: block; margin: 8px 0 4px; font-size: 13px; color: #9fb0c1; }
    input, select, button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; }
    button { cursor: pointer; font-weight: 600; }
    button:hover { border-color: #58a6ff; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .logs { height: 260px; overflow-y: auto; white-space: pre-wrap; background: #010409; border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px; border-bottom: 1px solid #30363d; text-align: left; }
    .actions { display: flex; gap: 8px; }
    .actions button { width: auto; }
    .warn { color: #f7b955; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Stock Sentinel</h1>
    <p class="warn">This app intentionally supports stock monitoring + Discord alerts only. Auto-checkout is not implemented.</p>

    <div class="grid">
      <div class="card">
        <h2>Workspace</h2>
        <label>Subscription Plan</label>
        <select id="plan">
          <option value="basic">basic</option>
          <option value="pro">pro</option>
          <option value="team">team</option>
        </select>
        <div class="actions" style="margin-top:10px;">
          <button onclick="savePlan()">Save Plan</button>
          <button onclick="toggleLoop()" id="loopBtn">Start Monitor Loop</button>
        </div>
      </div>

      <div class="card">
        <h2>Add Discord Webhook</h2>
        <label>Name</label>
        <input id="webhook_name" value="Main Discord" />
        <label>Webhook URL</label>
        <input id="webhook_url" placeholder="https://discord.com/api/webhooks/..." />
        <div class="actions" style="margin-top:10px;">
          <button onclick="addWebhook()">Add Webhook</button>
          <button onclick="testFirstWebhook()">Test First Webhook</button>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h2>Add Product Monitor</h2>
      <div class="row">
        <div>
          <label>Retailer</label>
          <select id="retailer">
            <option>walmart</option>
            <option>target</option>
            <option>bestbuy</option>
          </select>
        </div>
        <div>
          <label>Poll Interval (seconds)</label>
          <input id="poll_interval" type="number" value="20" />
        </div>
      </div>
      <label>Product URL</label>
      <input id="product_url" placeholder="https://www.walmart.com/ip/..." />
      <div class="row">
        <div>
          <label>Keyword Filter (optional)</label>
          <input id="keyword" placeholder="pokemon" />
        </div>
        <div>
          <label>Max Price Cents (optional)</label>
          <input id="max_price_cents" type="number" placeholder="4000" />
        </div>
      </div>
      <div class="row">
        <div>
          <label>Original MSRP Cents (Pokemon only, optional)</label>
          <input id="msrp_cents" type="number" placeholder="499" />
        </div>
      </div>
      <button style="margin-top:10px;" onclick="addMonitor()">Add Monitor</button>
    </div>

    <div class="card" style="margin-top:16px;">
      <h2>Monitors</h2>
      <table>
        <thead><tr><th>ID</th><th>Retailer</th><th>URL</th><th>Last Checked</th><th>Last Alert State</th><th>Actions</th></tr></thead>
        <tbody id="monitors"></tbody>
      </table>
    </div>

    <div class="card" style="margin-top:16px;">
      <h2>Live Logs</h2>
      <div id="logs" class="logs"></div>
    </div>
  </div>

  <script>
    const socket = io();
    let loopRunning = false;

    socket.on('log', (d) => {
      const logs = document.getElementById('logs');
      logs.textContent += d.message + "\n";
      logs.scrollTop = logs.scrollHeight;
    });

    async function loadWorkspace() {
      const data = await fetch('/api/workspace').then(r => r.json());
      document.getElementById('plan').value = data.plan;
    }

    async function savePlan() {
      const plan = document.getElementById('plan').value;
      const res = await fetch('/api/workspace/plan', {
        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({plan})
      });
      const data = await res.json();
      alert(data.error || `Plan updated to ${data.plan}`);
    }

    async function addWebhook() {
      const payload = {
        name: document.getElementById('webhook_name').value,
        webhook_url: document.getElementById('webhook_url').value,
      };
      const res = await fetch('/api/webhooks', {
        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
      });
      const data = await res.json();
      alert(data.error || `Webhook added (id=${data.id})`);
    }

    async function testFirstWebhook() {
      const hooks = await fetch('/api/webhooks').then(r => r.json());
      if (!hooks.length) {
        alert('Add a webhook first.');
        return;
      }
      const res = await fetch(`/api/webhooks/${hooks[0].id}/test`, {method: 'POST'});
      const data = await res.json();
      alert(JSON.stringify(data));
    }

    async function addMonitor() {
      const maxPrice = document.getElementById('max_price_cents').value;
      const msrp = document.getElementById('msrp_cents').value;
      const payload = {
        retailer: document.getElementById('retailer').value,
        product_url: document.getElementById('product_url').value,
        poll_interval_seconds: Number(document.getElementById('poll_interval').value),
        keyword: document.getElementById('keyword').value || null,
        max_price_cents: maxPrice ? Number(maxPrice) : null,
        msrp_cents: msrp ? Number(msrp) : null,
      };

      const res = await fetch('/api/monitors', {
        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
      });
      const data = await res.json();
      alert(data.error || `Monitor added (id=${data.id})`);
      await loadMonitors();
    }

    async function loadMonitors() {
      const rows = await fetch('/api/monitors').then(r => r.json());
      const tbody = document.getElementById('monitors');
      tbody.innerHTML = '';
      for (const r of rows) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.id}</td>
          <td>${r.retailer}</td>
          <td><a href="${r.product_url}" target="_blank">link</a></td>
          <td>${r.last_checked_at || '-'}</td>
          <td>${r.last_in_stock === null ? '-' : (r.last_in_stock ? 'in_stock' : 'out_or_unknown')}</td>
          <td class="actions">
            <button onclick="checkMonitor(${r.id})">Check</button>
            <button onclick="toggleMonitor(${r.id}, ${r.enabled ? 0 : 1})">${r.enabled ? 'Disable' : 'Enable'}</button>
            <button onclick="deleteMonitor(${r.id})">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      }
    }

    async function checkMonitor(id) {
      const res = await fetch(`/api/monitors/${id}/check`, {method: 'POST'});
      const data = await res.json();
      alert(JSON.stringify(data));
      await loadMonitors();
    }

    async function toggleMonitor(id, enabled) {
      await fetch(`/api/monitors/${id}`, {
        method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({enabled})
      });
      await loadMonitors();
    }

    async function deleteMonitor(id) {
      await fetch(`/api/monitors/${id}`, {method: 'DELETE'});
      await loadMonitors();
    }

    async function toggleLoop() {
      const endpoint = loopRunning ? '/api/stop' : '/api/start';
      await fetch(endpoint, {method: 'POST'});
      loopRunning = !loopRunning;
      document.getElementById('loopBtn').textContent = loopRunning ? 'Stop Monitor Loop' : 'Start Monitor Loop';
    }

    loadWorkspace();
    loadMonitors();
  </script>
</body>
</html>
