<!DOCTYPE html>
<html>
<head>
    <title>Pokémon TCG Sniper 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(#0a0a0a, #1a0033);
            color: #ffcc00;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1100px; margin: auto; }
        h1 {
            text-align: center;
            color: #ff0000;
            text-shadow: 0 0 10px #ffff00;
            margin-bottom: 20px;
        }
        .pokeball {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #fff 40%, #ff0000 40%);
            border-radius: 50%;
            border: 4px solid #000;
            position: relative;
            display: inline-block;
            margin: 0 10px;
        }
        .pokeball::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: #000;
            border-radius: 50%;
            border: 3px solid #fff;
        }

        .box {
            background: rgba(0,0,0,0.85);
            border: 3px solid #ffcc00;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }
        button {
            font-family: 'Press Start 2P', cursive;
            padding: 12px 24px;
            margin: 8px;
            font-size: 14px;
            cursor: pointer;
            border: 3px solid #ffcc00;
            background: #000;
            color: #ffcc00;
        }
        button:hover { background: #ffcc00; color: #000; }
        .green { border-color: #00ff00; color: #00ff00; }
        .red { border-color: #ff0000; color: #ff0000; }
        .blue { border-color: #00aaff; color: #00aaff; }

        #logs {
            background: #000;
            border: 3px solid #00ff00;
            height: 380px;
            overflow-y: scroll;
            padding: 15px;
            font-family: monospace;
            color: #00ff88;
            white-space: pre-wrap;
        }
        .product-card {
            background: #1a0033;
            border: 2px solid #ffcc00;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1><span class="pokeball"></span> POKÉMON TCG SNIPER 2026 <span class="pokeball"></span></h1>
    
    <div style="text-align:center; margin:15px 0;">
        <button onclick="toggleBot()" id="toggleBtn" class="green">▶ START BOT</button>
        <button onclick="sendTestAlert()" class="blue">🧪 TEST ALERT</button>
    </div>

    <div class="box">
        <h2>⚙️ Settings</h2>
        <label><input type="checkbox" id="aggressive" onchange="saveConfig()"> 🔥 Aggressive Mode</label><br><br>
        <label><input type="checkbox" id="proxy" onchange="saveConfig()"> 🌐 Use Proxies</label><br><br>
        ZIP: <input id="zip" value="32301" style="width:80px" onchange="saveConfig()">
        Webhook: <input id="webhook" style="width:60%" onchange="saveConfig()">
        <button onclick="saveConfig()">SAVE</button>
    </div>

    <div class="box">
        <h2>📦 Monitored Products</h2>
        <div id="productList"></div>
    </div>

    <div class="box">
        <h2>📜 Live Logs</h2>
        <div id="logs"></div>
    </div>
</div>

<script>
    const socket = io();
    socket.on('log', d => {
        const logs = document.getElementById('logs');
        logs.innerHTML += d.message + '<br>';
        logs.scrollTop = logs.scrollHeight;
    });

    function toggleBot() {
        const btn = document.getElementById('toggleBtn');
        const action = btn.innerText.includes('START') ? 'start' : 'stop';
        fetch('/api/' + action, {method: 'POST'})
            .then(() => {
                btn.innerText = btn.innerText.includes('START') ? '⏹ STOP BOT' : '▶ START BOT';
                btn.className = btn.innerText.includes('STOP') ? 'red' : 'green';
            });
    }

    function saveConfig() {
        const data = {
            AGGRESSIVE_MODE: document.getElementById('aggressive').checked,
            USE_PROXY: document.getElementById('proxy').checked,
            ZIP_CODE: document.getElementById('zip').value,
            DISCORD_WEBHOOK: document.getElementById('webhook').value
        };
        fetch('/api/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        }).then(() => alert('✅ Settings Saved!'));
    }

    function sendTestAlert() {
        fetch('/api/test-alert', {method: 'POST'})
            .then(() => alert('🧪 Test alert sent to Discord!'));
    }

    function loadProducts() {
        fetch('/api/products')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('productList');
                list.innerHTML = '';
                data.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'product-card';
                    div.innerHTML = `<strong>${p.retailer}</strong> ${p.name} <small style="color:#888">${p.url.substring(0,45)}...</small>`;
                    list.appendChild(div);
                });
            });
    }

    window.onload = () => {
        loadProducts();
        document.getElementById('toggleBtn').innerText = '▶ START BOT';
    };
</script>
</body>
</html>
