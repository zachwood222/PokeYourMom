<!DOCTYPE html>
<html>
<head>
    <title>Pokémon Target Sniper 2026 - Web Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: #00ff88; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        button { padding: 12px 20px; margin: 5px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; }
        .green { background: #00cc00; color: black; }
        .red { background: #cc0000; color: white; }
        .orange { background: #ff8800; color: black; }
        #logs { background: #000; height: 380px; overflow-y: scroll; padding: 15px; font-family: Consolas, monospace; border: 1px solid #00ff88; }
        .box { background: #1a1a1a; padding: 18px; border-radius: 8px; margin: 15px 0; border: 2px solid #00ff88; }
        input, textarea { background: #222; color: #0f0; border: 1px solid #0f0; padding: 8px; margin: 5px 0; width: 100%; }
        ul { list-style: none; padding: 0; }
        li { background: #222; padding: 10px; margin: 6px 0; border-radius: 4px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎯 Pokémon Target Sniper Bot 2026</h1>
    
    <button onclick="toggleBot()" id="toggleBtn" class="green" style="font-size:18px;">START BOT</button>
    <button onclick="loadProducts()" style="background:#444;">Refresh Products</button>

    <!-- Drop Timer -->
    <div class="box">
        <h2>⏰ Next Target Drop Windows (ET)</h2>
        <div id="dropTimer" style="font-size:18px; font-weight:bold;"></div>
        <button onclick="enableAggressiveForDrop()" class="orange">🚀 Enable Aggressive for Next Drop</button>
    </div>

    <!-- Group Alerts -->
    <div class="box">
        <h2>📡 Group Alerts Listener</h2>
        <label><input type="checkbox" id="alertListener" onchange="updateConfig()" checked> Enable Listener</label><br><br>
        <textarea id="alertWebhooks" rows="3" placeholder="Paste Discord webhook URLs (one per line)"></textarea>
        <button onclick="saveAlertWebhooks()">Save Alert Webhooks</button>
    </div>

    <h2>Settings</h2>
    <div class="box">
        <label><input type="checkbox" id="autoCheckout" onchange="updateConfig()"> Auto Full Checkout (High Risk)</label><br>
        <label><input type="checkbox" id="aggressive" onchange="updateConfig()"> Aggressive Mode</label><br>
        <label><input type="checkbox" id="trust" onchange="updateConfig()"> Trust Building</label><br>
        <label><input type="checkbox" id="proxy" onchange="updateConfig()"> Use Proxies</label><br><br>
        Discord Webhook: <input type="text" id="webhook" style="width:500px" onchange="updateConfig()">
    </div>

    <h2>Add New Product</h2>
    <div class="box">
        <input id="prodName" placeholder="Product Name (e.g. Prismatic Evolutions ETB)">
        <input id="prodUrl" placeholder="Full Target URL" style="width:500px">
        <button onclick="addProduct()">+ Add Product</button>
    </div>

    <h2>Monitored Products (<span id="productCount">0</span>)</h2>
    <div class="box">
        <ul id="productList"></ul>
    </div>

    <h2>Live Logs</h2>
    <div id="logs"></div>
</div>

<script>
    const socket = io();
    socket.on('log', d => {
        const logs = document.getElementById('logs');
        logs.innerHTML += d.message + '<br>';
        logs.scrollTop = logs.scrollHeight;
    });

    function toggleBot() {
        const btn = document.getElementById('toggleBtn');
        const isStarting = btn.innerText.includes('START');
        fetch('/api/' + (isStarting ? 'start' : 'stop'), {method: 'POST'})
            .then(() => {
                btn.innerText = isStarting ? 'STOP BOT' : 'START BOT';
                btn.className = isStarting ? 'red' : 'green';
            });
    }

    function updateConfig() {
        const data = {
            AUTO_FULL_CHECKOUT: document.getElementById('autoCheckout').checked,
            AGGRESSIVE_MODE: document.getElementById('aggressive').checked,
            TRUST_BUILDING: document.getElementById('trust').checked,
            USE_PROXY: document.getElementById('proxy').checked,
            DISCORD_WEBHOOK: document.getElementById('webhook').value,
            ENABLE_ALERT_LISTENER: document.getElementById('alertListener').checked
        };
        fetch('/api/config', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
    }

    function addProduct() {
        const name = document.getElementById('prodName').value.trim();
        const url = document.getElementById('prodUrl').value.trim();
        if (name && url) {
            fetch('/api/products', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, url})
            }).then(() => loadProducts());
            document.getElementById('prodName').value = '';
            document.getElementById('prodUrl').value = '';
        }
    }

    function loadProducts() {
        fetch('/api/products')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('productList');
                list.innerHTML = '';
                document.getElementById('productCount').textContent = data.length;
                data.forEach((p, i) => {
                    const li = document.createElement('li');
                    li.innerHTML = `${p.name} <button onclick="removeProduct(${i})" style="background:#aa0000;color:white;font-size:12px;padding:4px 8px;">Remove</button>`;
                    list.appendChild(li);
                });
            });
    }

    function removeProduct(index) {
        fetch(`/api/products/${index}`, {method: 'DELETE'})
            .then(() => loadProducts());
    }

    function saveAlertWebhooks() {
        const hooks = document.getElementById('alertWebhooks').value.trim().split('\n').filter(Boolean);
        fetch('/api/alerts', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({alert_webhooks: hooks})
        }).then(() => alert('Alert webhooks saved!'));
    }

    function enableAggressiveForDrop() {
        document.getElementById('aggressive').checked = true;
        updateConfig();
        alert("Aggressive Mode enabled!");
    }

    // Live Drop Timer
    function updateDropTimer() {
        const timerDiv = document.getElementById('dropTimer');
        const now = new Date();
        const etNow = new Date(now.toLocaleString("en-US", {timeZone: "America/New_York"}));
        let next = new Date(etNow);
        next.setHours(10, 0, 0, 0);
        if (etNow > next) next.setHours(14, 0, 0, 0);
        if (etNow > next) next.setDate(next.getDate() + 1);

        const diff = next - etNow;
        const h = Math.floor(diff / (1000*60*60));
        const m = Math.floor((diff % (1000*60*60)) / (1000*60));
        timerDiv.textContent = `Next Drop: ${next.getHours()===10 ? '10:00 AM' : '2:00 PM'} ET (${h}h ${m}m remaining)`;
    }

    // Initial load
    window.onload = () => {
        loadProducts();
        updateDropTimer();
        setInterval(updateDropTimer, 30000);
    };
</script>
</body>
</html>
